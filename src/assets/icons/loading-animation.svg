<style>
  .peak {
    transform-box: fill-box;
    transform-origin: bottom;
    animation: riseFall 1.8s cubic-bezier(0.34,1.1,0.64,1) infinite;
  }
  @keyframes riseFall {
    0%   { transform: scaleY(0); }
    35%  { transform: scaleY(1); }   /* risen */
    70%  { transform: scaleY(1); }   /* hold */
    100% { transform: scaleY(0); }   /* fall back, ready to loop */
  }
  .baseline {
    opacity: 0;
    animation: bf 0.35s ease-out both;
  }
  @keyframes bf { to { opacity:1; } }
  .peak-1 { animation-delay: 0.0s; }
